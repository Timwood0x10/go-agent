name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip running tests'
        required: false
        default: 'false'
        type: boolean
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != 'true'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: goagent
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Create pgvector extension
        run: |
          for i in {1..30}; do
            if docker exec postgres psql -U postgres -d goagent -c "CREATE EXTENSION IF NOT EXISTS vector;" 2>/dev/null; then
              echo "pgvector extension created successfully"
              break
            fi
            echo "Waiting for postgres to be ready... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        run: go test -race -tags=integration ./...

      - name: Run repository integration tests
        run: go test -race -tags=integration ./internal/storage/postgres/...
