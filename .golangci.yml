version: 2

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
    - bin

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert

linters-settings:

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
