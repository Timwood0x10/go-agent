# Multi-Agent Task Processing Workflow
# Demonstrates DAG-based agent orchestration

id: "multi-agent-workflow"
name: "Multi-Agent Task Processing Workflow"
version: "1.0.0"
description: "Generic multi-agent system with parallel task execution"

# Variables that can be referenced in steps
variables:
  default_priority: "medium"
  default_depth: "standard"

# Workflow steps with dependencies
steps:
  # Step 1: Analyze user input (no dependencies, runs first)
  - id: "analyze-input"
    name: "Analyze Input"
    agent_type: "top"
    input: "Analyze user requirements from: {{.input}}"
    timeout: 30s
    retry_policy:
      max_attempts: 3
      initial_delay: 1s
      max_delay: 5s
      backoff_multiplier: 2.0
    metadata:
      category: "preprocessing"
      priority: "high"

  # Step 2: Research topic A (depends on input analysis)
  - id: "research-topic-a"
    name: "Research Topic A"
    agent_type: "top"
    input: "Based on analysis from {{.analyze-input}}, research and compile findings"
    depends_on:
      - "analyze-input"
    timeout: 30s
    retry_policy:
      max_attempts: 2
      initial_delay: 1s

  # Step 3: Research topic B (depends on input analysis)
  - id: "research-topic-b"
    name: "Research Topic B"
    agent_type: "bottom"
    input: "Based on analysis from {{.analyze-input}}, investigate and gather data"
    depends_on:
      - "analyze-input"
    timeout: 30s
    retry_policy:
      max_attempts: 2
      initial_delay: 1s

  # Step 4: Research topic C (depends on input analysis)
  - id: "research-topic-c"
    name: "Research Topic C"
    agent_type: "top"
    input: "Based on analysis from {{.analyze-input}}, explore and document insights"
    depends_on:
      - "analyze-input"
    timeout: 30s
    retry_policy:
      max_attempts: 2
      initial_delay: 1s

  # Step 5: Aggregate all results (depends on all research steps)
  - id: "aggregate-results"
    name: "Aggregate Results"
    agent_type: "bottom"
    input: "Combine findings from {{.research-topic-a}}, {{.research-topic-b}}, and {{.research-topic-c}} into a comprehensive report"
    depends_on:
      - "research-topic-a"
      - "research-topic-b"
      - "research-topic-c"
    timeout: 45s
    retry_policy:
      max_attempts: 1
    metadata:
      category: "aggregation"
      priority: "high"

metadata:
  author: "GoAgent Team"
  created_date: "2026-03-21"
  tags: ["multi-agent", "workflow", "task-processing"]
