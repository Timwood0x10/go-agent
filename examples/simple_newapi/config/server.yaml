# GoAgent Multi-Agent Workflow Example Configuration
# Configure your agents and prompts here

# LLM Configuration
llm:
  provider: "ollama"
  api_key: ""
  base_url: "http://localhost:11434"
  model: "llama3.2"
  timeout: 60

# API Configuration
api:
  request_timeout: 30
  max_retries: 3
  retry_delay: 1

# Agent Configuration
agents:
  # Leader Agent coordinates all sub-agents
  leader:
    id: "leader-default"
    max_steps: 10
    max_parallel_tasks: 5

  # Sub Agents - Each handles a specific task domain
  sub:
    # Researcher A Agent
    - id: "agent-researcher-a"
      type: "top"
      name: "Researcher A"
      max_retries: 3
      timeout: 30

    # Researcher B Agent
    - id: "agent-researcher-b"
      type: "bottom"
      name: "Researcher B"
      max_retries: 3
      timeout: 30

    # Data Analyzer Agent
    - id: "agent-analyzer"
      type: "top"
      name: "Data Analyzer"
      max_retries: 3
      timeout: 30

    # Result Summarizer Agent
    - id: "agent-summarizer"
      type: "bottom"
      name: "Result Summarizer"
      max_retries: 3
      timeout: 30

# Prompt Templates for Agents
prompts:
  # Prompt for analyzing user requirements
  input_analysis: |
    Analyze the user's task requirements from the following request:
    {{.user_input}}

    Return JSON format only:
    {
      "domains": ["domain1", "domain2"],
      "priority": "high|medium|low",
      "scope": {"depth": "standard|deep", "breadth": "narrow|wide"},
      "keywords": ["keyword1", "keyword2"]
    }

  # Prompt for executing tasks and generating results
  task_execution: |
    You are a domain expert specializing in {{.category}}.

    Task requirements:
    - Domains: {{.domains}}
    - Priority: {{.priority}}
    - Scope: {{.scope}}
    - Keywords: {{.keywords}}

    Generate 3 findings in JSON format:
    {
      "items": [
        {
          "name": "Finding title",
          "reason": "Why this is relevant"
        }
      ]
    }

# Output Configuration
output:
  format: "simple"  # simple, table, json
