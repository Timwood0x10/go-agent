# OpenRouter Example Configuration
# This example uses OpenRouter to access various LLM models

server:
  host: "localhost"
  port: 8080

llm:
  provider: "openrouter"       # Uses OpenRouter API
  api_key: "sk-or-v1-xxx" # Replace with your OpenRouter API key
  base_url: "https://openrouter.ai/api/v1"
  model: "minimax/minimax-m2-her"  # Model available on OpenRouter
  timeout: 60                 # Request timeout in seconds

agents:
  leader:
    id: "leader-1"
    max_steps: 10
    max_parallel_tasks: 5
    max_validation_retry: 3
    enable_cache: true

  sub:
    - id: "sub-top-1"
      type: "agent_top"
      category: "上衣"
      max_retries: 3
      timeout: 30
      model: "minimax/minimax-m2-her"

    - id: "sub-bottom-1"
      type: "agent_bottom"
      category: "下装"
      max_retries: 3
      timeout: 30
      model: "minimax/minimax-m2-her"

    - id: "sub-shoes-1"
      type: "agent_shoes"
      category: "鞋子"
      max_retries: 3
      timeout: 30
      model: "minimax/minimax-m2-her"

    - id: "sub-head-1"
      type: "agent_head"
      category: "头部配饰"
      max_retries: 3
      timeout: 30
      model: "minimax/minimax-m2-her"

    - id: "sub-accessory-1"
      type: "agent_accessory"
      category: "配饰"
      max_retries: 3
      timeout: 30
      model: "minimax/minimax-m2-her"

prompts:
  profile_extraction: |
    从以下用户输入中提取穿搭偏好信息：

    {{.input}}

    请严格按照以下 JSON Schema 返回，**只返回 JSON，不要其他文字**：
    ```json
    {
      "style": ["casual", "minimalist"],
      "occasions": ["daily", "work"],
      "budget": {"min": 0, "max": 1000},
      "colors": ["black", "white"],
      "favorite_brands": []
    }
    ```

  recommendation: |
    基于以下信息推荐 {{.category}} 类别的服装：

    用户风格偏好: {{.style}}
    场合: {{.occasions}}
    预算范围: {{.budget}}

    请严格按照以下 JSON Schema 返回，**只返回 JSON，不要其他文字**：
    ```json
    {
      "items": [
        {
          "item_id": "商品ID",
          "name": "商品名称",
          "category": "类别",
          "price": 价格,
          "match_reason": "推荐理由"
        }
      ]
    }
    ```

  style_analysis: |
    分析以下风格描述，识别关键特征：

    {{.description}}

    请严格按照以下 JSON Schema 返回，**只返回 JSON，不要其他文字**：
    ```json
    {
      "primary_style": "主风格",
      "secondary_styles": ["辅助风格"],
      "color_palette": ["颜色"],
      "silhouette_preference": "版型偏好",
      "key_elements": ["关键元素"]
    }
    ```

output:
  format: "simple"
  item_template: "{{.ItemID}}: {{.Name}} ({{.Price}})"
  summary_template: "Got {{.Count}} recommendations"

workflow:
  definition_path: "./configs/workflow.yaml"
  auto_reload: false
  reload_interval: 60
