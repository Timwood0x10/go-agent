# GoAgent Simple Demo Configuration
# Just configure LLM and you're ready to go!

llm:
  # Choose your LLM provider: ollama, openrouter, openai, anthropic
  provider: "ollama"
  
  # API key (leave empty for Ollama, required for OpenAI/OpenRouter/Anthropic)
  api_key: ""
  
  # Base URL (Ollama: http://localhost:11434, OpenRouter: https://openrouter.ai/api/v1)
  base_url: "http://localhost:11434"
  
  # Model name (Ollama: llama3.2, OpenRouter: meta-llama/llama-3.1-8b-instruct)
  model: "llama3.2"
  
  # Request timeout in seconds
  timeout: 60

# API configuration (optional, defaults are fine)
api:
  request_timeout: 30
  max_retries: 3
  retry_delay: 1

# Memory configuration (optional, defaults are fine)
memory:
  enabled: true
  session:
    max_history: 50
