# DevAgent Workflow - DAG-based Developer Assistant
# 支持并行和串行执行，提高开发效率

id: "dev-workflow"
name: "Developer Assistant Workflow"
version: "2.0.0"
description: "Multi-agent workflow for code generation, review, testing, and documentation"

variables:
  default_language: "python"
  code_quality_threshold: "80"

steps:
  # Step 1: generate-code 
  - id: "generate-code"
    name: "Generate Code"
    agent_type: "code"
    depends_on: []
    input: "{{.input}}"
    timeout: 120s
    retry_policy:
      max_attempts: 3
      initial_delay: 2s

  # Step 2: generate-docs
  - id: "generate-docs"
    name: "Generate Documentation"
    agent_type: "docs"
    depends_on: []
    input: "{{.input}}"
    timeout: 60s
    retry_policy:
      max_attempts: 2
      initial_delay: 1s

  # Step 3: generate-tests
  - id: "generate-tests"
    name: "Generate Tests"
    agent_type: "test"
    depends_on: ["generate-code"]
    input: "{{.input}}\n\n已生成的代码:\n{{.generate-code}}"
    timeout: 60s
    retry_policy:
      max_attempts: 2
      initial_delay: 1s

  # Step 4: code-review
  - id: "code-review"
    name: "Code Review"
    agent_type: "review"
    depends_on: ["generate-code", "generate-docs"]
    input: "{{.input}}\n\n已生成的代码:\n{{.generate-code}}\n\n已生成的文档:\n{{.generate-docs}}"
    timeout: 60s
    retry_policy:
      max_attempts: 1

metadata:
  author: "GoAgent Team"
  version: "2.0"
  tags: "dev-assistant,workflow,dag"
