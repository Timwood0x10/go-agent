# DevAgent Configuration - Developer Assistant
# 使用新的统一API，支持workflow编排、memory和蒸馏

llm:
  provider: "ollama"
  api_key: ""
  base_url: "http://localhost:11434"
  model: "llama3.2"
  timeout: 120
  max_tokens: 4096  # Increased for longer code generation

api:
  request_timeout: 30
  max_retries: 3
  retry_delay: 1

# Agent Configuration
agents:
  leader:
    id: "leader-dev"
    max_steps: 10
    max_parallel_tasks: 4

  sub:
    - id: "agent-code"
      type: "code"
      category: "code"
      name: "Code Generator"
      max_retries: 3
      timeout: 120

    - id: "agent-review"
      type: "review"
      category: "review"
      name: "Code Reviewer"
      max_retries: 3
      timeout: 60

    - id: "agent-test"
      type: "test"
      category: "test"
      name: "Test Generator"
      max_retries: 3
      timeout: 60

    - id: "agent-docs"
      type: "docs"
      category: "docs"
      name: "Documentation Generator"
      max_retries: 3
      timeout: 60

# Prompt Templates
# NOTE: The framework uses strings.ReplaceAll for {{.category}} and {{.input}}.
#       Do NOT use Go template conditionals ({{if eq ...}}) — they will not be evaluated.
prompts:
  recommendation: |
    你是一个专业的Go语言开发助手，当前角色是 {{.category}} 专家。

    用户的完整需求: {{.input}}

    你的角色是 "{{.category}}"，请严格按照以下角色定义执行任务：

    - 如果你的角色是 "code"：
      请生成完整、可运行的Go代码来实现用户的需求。代码必须包含 main 函数，可以直接 go run 运行。
      包含必要的注释和错误处理。严格按照用户需求生成具体实现，不要生成模板代码或占位符。

    - 如果你的角色是 "test"：
      请为用户需求生成完整的Go测试代码。使用标准 testing 包，函数名以 Test 开头。
      测试应覆盖正常情况、边界情况和异常情况。

    - 如果你的角色是 "docs"：
      请生成 README.md 格式的文档，包含功能描述、使用方法、运行方式和代码示例。
      内容使用 Markdown 格式，不要生成Go代码。

    - 如果你的角色是 "review"：
      请对用户需求对应的代码进行审查，评价代码质量、性能、可维护性，并给出改进建议。

    请严格按照以下JSON格式返回结果（不要包含其他内容）：
    {
      "items": [
        {
          "name": "文件名（不含扩展名）",
          "description": "简要描述",
          "content": "完整内容（代码或文档文本）",
          "language": "go 或 markdown 或 text"
        }
      ]
    }

# Memory Configuration
memory:
  enabled: true
  session:
    max_history: 20
  user_profile:
    enabled: true
    storage: "memory"
  task_distillation:
    enabled: true
    storage: "memory"
    prompt: |
      请简洁总结以下开发任务的关键信息：
      - 任务类型和目标
      - 技术栈（语言、框架）
      - 主要功能点
      - 关键技术要点
      
      返回JSON对象：{"task": "...", "tech_stack": "...", "features": "...", "key_points": "..."}
