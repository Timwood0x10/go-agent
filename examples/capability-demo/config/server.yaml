# Capability Demo Configuration
# Demonstrates the Agent Capability Engine (ACE) workflow

server:
  host: "localhost"
  port: 8082

llm:
  provider: "ollama"
  api_key: ""
  base_url: "http://localhost:11434"
  model: "llama3.2"
  timeout: 60

# Tool configuration for capability demo
tools:
  # All tools enabled to demonstrate ACE filtering
  agents:
    capability-demo-1:
      name: "Capability Demo Agent"
      description: "Demonstrates ACE workflow: Query → Capability → Tools → Result"
      system_prompt: |
        You are a helpful assistant with access to various tools.
        Use tools when appropriate to answer user questions accurately.

        When you need to use a tool, format your response as:
        [TOOL:tool_name {"param": "value"}]

        For example:
        - [TOOL:calculator {"expression": "100*(100+1)/2"}]
        - [TOOL:datetime {"operation": "now"}]

        If you don't need a tool, just answer directly.
      tools: []  # Empty means all tools enabled

# Legacy agents configuration (for backward compatibility)
agents:
  leader:
    id: "leader-1"
    max_steps: 10
    max_parallel_tasks: 5
    max_validation_retry: 3
    enable_cache: true

memory:
  enabled: true
  session:
    max_history: 20

output:
  format: "simple"