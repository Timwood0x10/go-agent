# Graph Demo Configuration

# Service configuration
service:
  request_timeout: 30s
  max_retries: 3
  retry_delay: 1s

# Observability configuration
observability:
  enabled: true
  tracer_type: "log"  # Options: log, noop
  
  log_tracer:
    level: "info"
    format: "json"

# Rate limiting configuration
rate_limiting:
  enabled: false  # Set to true to enable rate limiting
  
  token_bucket:
    rate: 10.0      # requests per second
    burst: 5        # burst size
    timeout: 5s    # wait timeout

# Graph configuration
graph:
  default_scheduler: "default"  # Options: default, priority, short_job
  
  priority_scheduler:
    priorities:
      llm_node: 10
      http_node: 5
      db_node: 3
      fast_operation: 8
  
  short_job_scheduler:
    estimates:
      llm_call: 3000    # 3 seconds
      http_request: 100  # 100 milliseconds
      db_query: 200     # 200 milliseconds
      cache_lookup: 10   # 10 milliseconds

# Logging configuration
logging:
  level: "info"
  format: "text"
  output: "stdout"