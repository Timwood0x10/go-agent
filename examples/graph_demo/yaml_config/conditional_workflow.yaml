# Conditional workflow configuration
# This demonstrates conditional branching based on status

graph:
  id: "conditional-workflow"
  start_node: "check_status"

  nodes:
    - id: "check_status"
      type: "function"
      description: "Check system status"

    - id: "success_handler"
      type: "function"
      description: "Handle success case"

    - id: "error_handler"
      type: "function"
      description: "Handle error case"

    - id: "fallback_handler"
      type: "function"
      description: "Handle fallback case"

  edges:
    - from: "check_status"
      to: "success_handler"
      # TODO: implement condition parsing (expected by 2026-04-01)

    - from: "check_status"
      to: "error_handler"

    - from: "check_status"
      to: "fallback_handler"