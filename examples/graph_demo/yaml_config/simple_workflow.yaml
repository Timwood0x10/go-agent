# Simple workflow configuration
# This demonstrates a basic linear workflow with function nodes

graph:
  id: "simple-workflow"
  start_node: "validate"

  nodes:
    - id: "validate"
      type: "function"
      description: "Validate input data"

    - id: "process"
      type: "function"
      description: "Process the data"

    - id: "save"
      type: "function"
      description: "Save results"

  edges:
    - from: "validate"
      to: "process"

    - from: "process"
      to: "save"