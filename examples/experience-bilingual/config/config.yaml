# Experience Bilingual Test Configuration
# This configuration is for testing experience distillation with database storage

database:
  host: localhost
  port: 5433
  user: postgres
  password: postgres
  database: goagent

embedding_service:
  url: http://localhost:8000
  model: qwen3-embedding:0.6b

llm:
  provider: ollama
  api_key: ""
  base_url: http://localhost:11434
  model: llama3.2:latest
  timeout: 60

distillation:
  enabled: true
  min_task_length: 10
  min_result_length: 20

retrieval:
  top_k: 5
  min_score: 0.5
  similarity_threshold: 0.9