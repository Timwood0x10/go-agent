# Travel Planning Agent Configuration
# Example: Multi-agent travel assistant using OpenRouter

server:
  host: "localhost"
  port: 8080

# LLM Configuration - OpenRouter
llm:
  provider: "openrouter"
  api_key: "sk-or-v1-xxx"  # Replace with your OpenRouter API key
  base_url: "https://openrouter.ai/api/v1"
  model: "meta-llama/llama-3.1-8b-instruct"  # Free model that works globally
  timeout: 60
  max_tokens: 4096

# Agent Configuration
agents:
  leader:
    id: "leader-travel"
    max_steps: 10
    max_parallel_tasks: 4
    max_validation_retry: 3
    enable_cache: true

  sub:
    # Destination recommendation agent
    - id: "agent-destination"
      type: "destination"
      category: "destination"
      triggers:  # Leader calls this agent when profile has these fields
        - "destination"
      max_retries: 3
      timeout: 30
      model: "google/gemini-3.1-flash-lite-preview"
      provider: "openrouter"

    # Food & dining recommendation agent
    - id: "agent-food"
      type: "food"
      category: "food"
      triggers:
        - "food"
        - "美食"
      max_retries: 3
      timeout: 30
      model: "allenai/olmo-3.1-32b-think"
      provider: "openrouter"

    # Hotel recommendation agent
    - id: "agent-hotel"
      type: "hotel"
      category: "hotel"
      triggers:
        - "hotel"
        - "住宿"
      max_retries: 3
      timeout: 30
      model: "google/gemini-3.1-flash-lite-preview"
      provider: "openrouter"

    # Itinerary planning agent
    - id: "agent-itinerary"
      type: "itinerary"
      category: "itinerary"
      triggers:
        - "itinerary"
        - "行程"
      max_retries: 3
      timeout: 45
      model: "anthropic/claude-4.5-sonnet"
      provider: "openrouter"

# Prompt Templates
prompts:
  # Extract travel preferences from user input
  profile_extraction: |
    你是一位旅行助手。请从用户的输入中提取旅行偏好信息。
    
    用户输入: {{.input}}
    
    请分析用户输入，尽可能提取或推断出以下信息，返回JSON格式：
    - destination: 目的地（如果用户提到了目的地，请填写，如"东京"、"清迈"等）
    - duration: 旅行天数（如果用户提到了天数，请填写，如"5天4晚"）
    - budget: 预算范围（如果用户提到了预算，请填写数字，如10000）
    - preferences: 用户偏好列表（从用户输入中提取，如"美食"、"购物"、"自然"、"文化"等关键词）
    - travel_style: 旅行风格（如果能推断，请填写，如"休闲"、"奢华"、"经济"）
    
    **重要**：请尽可能从用户输入中提取信息，不要返回null。如果某个信息确实无法从输入中确定，请尝试根据常理推断。
    
    只返回JSON，不要其他内容。
  
  # Generate recommendations based on user profile
  recommendation: |
    你是一位专业的旅行顾问。请根据以下信息推荐 {{.Category}}：
    
    用户目的地: {{if index . "destination"}}{{index . "destination"}}{{else}}<no value>{{end}}
    旅行天数: {{if index . "duration"}}{{index . "duration"}}{{else}}<no value>{{end}}
    预算范围: {{if index . "budget"}}{{index . "budget"}}{{else if index . "budget_travel"}}{{index . "budget_travel"}}{{else}}<no value>{{end}}
    用户偏好: {{if index . "preferences"}}{{index . "preferences"}}{{else}}<no value>{{end}}
    旅行风格: {{if index . "travel_style"}}{{index . "travel_style"}}{{else}}<no value>{{end}}
    
    请严格按照以下JSON Schema返回，只返回JSON：
    ```json
    {
      "items": [
        {
          "item_id": "唯一ID",
          "name": "名称",
          "description": "简要描述",
          "category": "{{.Category}}",
          "price": 价格（数字）,
          "location": "位置",
          "highlights": ["亮点1", "亮点2"]
        }
      ],
      "reason": "推荐理由"
    }
    ```

# Output Configuration
output:
  format: "table"  # "table", "json", "simple"
  item_template: "{{.Name}} - {{.Location}} (¥{{.Price}})"
  summary_template: "为您推荐了 {{.Count}} 个选项"

# Validation Configuration
validation:
  enabled: true                  # Enable result validation
  schema_type: "travel"          # "fashion", "travel", "custom"
  retry_on_fail: true            # Retry LLM call when validation fails
  max_retries: 3                # Max retry attempts
  strict_mode: false            # If true, return error on validation failure

# Workflow Configuration (future)
workflow:
  definition_path: "./configs/workflow.yaml"
  auto_reload: false
  reload_interval: 60

# Storage Configuration (future - not used in this example)
storage:
  enabled: false
  type: "postgres"
  host: "localhost"
  port: 5432
  username: "postgres"
  password: "postgres"
  database: "travel_agent"
  ssl_mode: "disable"
  pgvector:
    enabled: false
    dimension: 1536
    table_name: "embeddings"

# Memory Configuration (future - not used in this example)
memory:
  enabled: false
  session:
    enabled: true
    max_history: 50
  user_profile:
    enabled: false
    storage: "memory"
    vector_db: false
  task_distillation:
    enabled: false
    storage: "memory"
    vector_store: false
    prompt: "请简洁总结以下旅行规划的关键信息，包括：目的地、预算、偏好、行程安排。"
