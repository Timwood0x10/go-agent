# Multi-Agent Dialog Configuration
# Supports both internal tool registration and user-defined tool configuration

server:
  host: "localhost"
  port: 8081

llm:
  provider: "ollama"
  api_key: ""
  base_url: "http://localhost:11434"
  model: "llama3.2"
  timeout: 60

# Tool configuration - specify which tools each agent can use
# You can define custom tool assignments here
tools:
  # Global tools configuration (default for all agents if not overridden)
  defaults:
    - "calculator"
    - "datetime"
    - "text_processor"

  # Agent-specific tool assignments
  agents:
    research-agent-1:
      name: "Research Assistant"
      description: "An agent that can search, analyze, and process information"
      system_prompt: |
        You are a Research Assistant with access to various tools for information gathering and analysis.
        IMPORTANT: When the user asks about your capabilities, provide a detailed list of your tools.
        When you need to use a tool, use this format: [TOOL:tool_name {"param": "value"}]
      tools:
        - "http_request"
        - "text_processor"
        - "json_tools"
        - "data_validation"
        - "regex_tool"
        - "calculator"
        - "datetime"

    tools-agent-1:
      name: "Tools Specialist"
      description: "An agent that can manipulate files, process data, and perform calculations"
      system_prompt: |
        You are a Tools Specialist with access to system utilities for file operations, calculations, and data processing.
        IMPORTANT: When the user asks about your capabilities, provide a detailed list of your tools.
        When you need to use a tool, use this format: [TOOL:tool_name {"param": "value"}]
      tools:
        - "file_tools"
        - "calculator"
        - "datetime"
        - "id_generator"
        - "data_transform"
        - "json_tools"

# Legacy agents configuration (for backward compatibility)
agents:
  leader:
    id: "leader-1"
    max_steps: 10
    max_parallel_tasks: 5
    max_validation_retry: 3
    enable_cache: true

  sub:
    - id: "research-agent-1"
      type: "research"
      category: "information"
      max_retries: 3
      timeout: 30
      model: "llama3.2"

    - id: "tools-agent-1"
      type: "tools"
      category: "system"
      max_retries: 3
      timeout: 30
      model: "llama3.2"

prompts:
  profile_extraction: |
    Extract user profile from input.

  recommendation: |
    Generate recommendations.

  style_analysis: |
    Analyze style.

output:
  format: "simple"
  item_template: "{{.ItemID}}: {{.Name}} ({{.Price}})"
  summary_template: "Got {{.Count}} results"

workflow:
  definition_path: "./configs/workflow.yaml"
  auto_reload: false
  reload_interval: 60

storage:
  enabled: false
  type: "postgres"
  host: "localhost"
  port: 5433
  username: "postgres"
  password: "postgres"
  database: "multiagent"

memory:
  enabled: true
  session:
    max_history: 20