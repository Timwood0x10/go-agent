# DevAgent Workflow Definition
# DAG-based orchestration for code development tasks

id: "dev-workflow"
name: "Developer Assistant Workflow"
version: "1.0"
description: "Multi-agent workflow for code generation, review, testing, and documentation"

steps:
  - id: "analyze"
    name: "Task Analysis"
    agent_type: "leader"
    input: "{{.input}}"
    timeout: 30s

  - id: "code"
    name: "Code Generation"
    agent_type: "code"
    depends_on: ["analyze"]
    timeout: 60s

  - id: "docs"
    name: "Documentation"
    agent_type: "docs"
    depends_on: ["analyze"]
    timeout: 45s

  - id: "test"
    name: "Test Generation"
    agent_type: "test"
    depends_on: ["code"]
    timeout: 45s

  - id: "review"
    name: "Code Review"
    agent_type: "review"
    depends_on: ["code", "docs"]
    timeout: 45s

variables:
  project_language: "python"
  project_type: "cli"