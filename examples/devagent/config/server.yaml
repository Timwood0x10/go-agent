# DevAgent Configuration
# Developer Assistant with Multi-Agent Orchestration
# Features: Code generation, review, testing, documentation with DAG orchestration

server:
  host: "localhost"
  port: 8080

# LLM Configuration - OpenRouter
llm:
  provider: "openrouter"
  api_key: "sk-or-v1-xxx"  # Replace with your OpenRouter API key
  base_url: "https://openrouter.ai/api/v1"
  model: "meta-llama/llama-3.1-8b-instruct"
  timeout: 120
  max_tokens: 8192 

# Agent Configuration
agents:
  leader:
    id: "leader-dev"
    max_steps: 10
    max_parallel_tasks: 4
    max_validation_retry: 3
    enable_cache: true

  sub:
    # Code generation agent - Uses llama model for better stability
    - id: "agent-code"
      type: "code"
      category: "code"
      triggers:
        - "code"
        - "implementation"
        - "开发"
        - "实现"
      max_retries: 3
      timeout: 120
      model: "meta-llama/llama-3.1-8b-instruct"
      provider: "openrouter"

    # Code review agent - Uses free model for code review
    - id: "agent-review"
      type: "review"
      category: "review"
      triggers:
        - "review"
        - "审查"
      max_retries: 3
      timeout: 60
      model: "google/gemini-3.1-flash-lite-preview"
      provider: "openrouter"
      depends_on:
        - "code"

    # Test generation agent - Uses free model for test generation
    - id: "agent-test"
      type: "test"
      category: "test"
      triggers:
        - "test"
        - "testing"
        - "测试"
      max_retries: 3
      timeout: 60
      model: "google/gemini-3.1-flash-lite-preview"
      provider: "openrouter"
      depends_on:
        - "code"

    # Documentation agent - Uses free model for documentation
    - id: "agent-docs"
      type: "docs"
      category: "docs"
      triggers:
        - "docs"
        - "documentation"
        - "文档"
      max_retries: 3
      timeout: 60
      model: "google/gemini-3.1-flash-lite-preview"
      provider: "openrouter"

# Prompt Templates
prompts:
  # Extract task requirements from user input
  profile_extraction: |
    你是一位开发者助手。请从用户的输入中提取开发任务信息。

    用户输入: {{.input}}

    请分析用户输入，尽可能提取或推断出以下信息，返回JSON格式：
    - task_type: 任务类型（如"api","ui","database","algorithm"等）
    - language: 编程语言（如"python","golang","javascript"等）
    - framework: 框架或库（如"flask","gin","react"等）
    - requirements: 需求列表（从用户输入中提取关键需求）
    - features: 功能列表（具体要实现的功能点）

    **重要**：请尽可能从用户输入中提取信息，不要返回null。如果某个信息确实无法从输入中确定，请尝试根据常理推断。

    只返回JSON，不要其他内容。

  # Generate code based on requirements
  recommendation: |
    你是一位专业的开发者。请根据以下信息生成 {{.Category}}：

    任务类型: {{if index . "task_type"}}{{index . "task_type"}}{{else}}<no value>{{end}}
    编程语言: {{if index . "language"}}{{index . "language"}}{{else}}<no value>{{end}}
    框架: {{if index . "framework"}}{{index . "framework"}}{{else}}<no value>{{end}}
    需求: {{if index . "requirements"}}{{index . "requirements"}}{{else}}<no value>{{end}}
    功能: {{if index . "features"}}{{index . "features"}}{{else}}<no value>{{end}}

    {{if eq .Category "code"}}
    ## Code 生成要求
    生成完整、可直接运行的代码实现。要求：
    - 代码结构清晰，注释详细
    - 遵循编程语言的最佳实践
    - 包含必要的错误处理
    - 代码可以独立运行或作为库使用
    {{end}}

    {{if eq .Category "test"}}
    ## Test 生成要求
    生成测试代码。要求：
    - 假设主代码已经实现，只生成测试用例
    - 测试用例应覆盖正常、边界、异常情况
    - 使用合适的测试框架
    - 不重复实现被测试的功能，只引用
    {{end}}

    {{if eq .Category "docs"}}
    ## Documentation 生成要求
    生成完整的 Markdown 文档（不是代码！）。要求：
    - 使用 Markdown 格式，包含标题、章节、代码块
    - 包含以下部分：
      1. 标题和简介
      2. 功能说明和原理
      3. 安装和使用方法
      4. API 接口或函数说明
      5. 代码示例
      6. 注意事项和限制
      7. 复杂度分析（算法类）
    - 文档应该面向使用者，不是开发者自己
    {{end}}

    {{if eq .Category "review"}}
    ## Review 生成要求
    生成代码审查意见。要求：
    - 使用 Markdown 格式
    - 评价维度：代码质量、性能、安全性、可维护性、最佳实践
    - 提供具体的改进建议
    - 格式清晰，易于阅读
    {{end}}

    请严格按照以下JSON Schema返回，只返回JSON：
    ```json
    {
      "items": [
        {
          "item_id": "唯一ID",
          "name": "代码/文档名称",
          "description": "详细描述",
          "category": "{{.Category}}",
          "content": "实际内容（代码、文档文本等）",
          "language": "编程语言",
          "quality_score": 质量分数（0-100的数字）
        }
      ],
      "reason": "生成理由"
    }
    ```

# Output Configuration
output:
  format: "simple"
  item_template: "{{.Name}} ({{.Language}}) - {{.Description}}"
  summary_template: "生成了 {{.Count}} 个{{.Category}}项"

# Validation Configuration
validation:
  enabled: false  # 禁用验证以保留 content 字段
  schema_type: "custom"
  retry_on_fail: false
  max_retries: 3
  strict_mode: false

# Workflow Configuration
workflow:
  definition_path: "./examples/devagent/config/workflow.yaml"
  auto_reload: false
  reload_interval: 60

# Memory Configuration
memory:
  enabled: true
  session:
    enabled: true
    max_history: 100
  user_profile:
    enabled: true
    storage: "memory"
    vector_db: false
  task_distillation:
    enabled: true
    storage: "memory"
    vector_store: false
    prompt: "请简洁总结以下开发任务的关键信息，包括：任务类型、编程语言、核心需求、主要功能点、依赖关系。"

# Storage Configuration
storage:
  enabled: false
  type: "postgres"